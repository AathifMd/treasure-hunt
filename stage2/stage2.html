<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stage 2 – Location Hints</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: 'Trebuchet MS', sans-serif; background: #e8f8f5; text-align: center; }
    h1 { color: #16a085; }
    #reader { width: 300px; margin: 20px auto; display: none; }
    .scan-btn { background: #16a085; color: white; padding: 15px 25px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
    .hint-box { margin-top: 20px; font-size: 20px; color: #7f8c8d; }
    .error { margin-top: 20px; color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h1>🧩 Stage 2 – Find the First Half</h1>
  <p>Click the button to open your camera and scan QR codes hidden in the building. Each scan reveals a location hint for the first half of your treasure, plus teasers for Stage 3.</p>

  <button class="scan-btn" id="openCamera">📷 Open Camera</button>
  <button class="scan-btn" id="closeCamera" style="background: #e74c3c; display: none;">❌ Close Camera</button>
  <div id="reader"></div>

  <div class="hint-box" id="hint">Hint will appear here...</div>
  <div class="error" id="error"></div>

  <script>
    const validCodes = ["STAGE2-CODE-1","STAGE2-CODE-2","STAGE2-CODE-3"]; // ✅ Replace with your codes
    let savedHints = localStorage.getItem("stage2Hints") ? JSON.parse(localStorage.getItem("stage2Hints")) : [];
    if (savedHints.length > 0) {
      document.getElementById("hint").innerText = "Previous Hints:\n" + savedHints.join("\n");
    }

    let html5QrCode;
    let isRunning = false;

    function onScanSuccess(decodedText) {
      if (validCodes.includes(decodedText)) {
        savedHints.push(decodedText);
        localStorage.setItem("stage2Hints", JSON.stringify(savedHints));
        document.getElementById("hint").innerText = "📍 Location Hint: " + decodedText + "\n\nAll Hints:\n" + savedHints.join("\n");
        document.getElementById("error").innerText = "";
      } else {
        document.getElementById("error").innerText = "❌ Not a valid hunt QR!";
      }
    }

    function onScanError(errorMessage) {
      console.warn(errorMessage);
    }

    // Open Camera Button
    document.getElementById("openCamera").addEventListener("click", () => {
      document.getElementById("openCamera").style.display = "none";
      document.getElementById("closeCamera").style.display = "inline-block";
      document.getElementById("reader").style.display = "block";
      document.getElementById("error").innerText = "Starting camera...";

      html5QrCode = new Html5Qrcode("reader");

      Html5Qrcode.getCameras().then(cameras => {
        if (cameras && cameras.length) {
          html5QrCode.start(
            cameras[1].id,
            { fps: 10, qrbox: 250 },
            onScanSuccess,
            onScanError
          ).then(() => {
            isRunning = true;
            document.getElementById("error").innerText = "";
            console.log("Camera started successfully");
          }).catch(err => {
            document.getElementById("error").innerText = "❌ Error starting camera: " + err;
            console.error("Error starting camera:", err);
          });
        } else {
          document.getElementById("error").innerText = "❌ No cameras found on this device.";
        }
      }).catch(err => {
        document.getElementById("error").innerText = "❌ Camera permission denied or not available.";
        console.error("Camera error:", err);
      });
    });

    // Close Camera Button
    document.getElementById("closeCamera").addEventListener("click", () => {
      if (isRunning) {
        html5QrCode.stop().then(() => {
          isRunning = false;
          document.getElementById("reader").style.display = "none";
          document.getElementById("closeCamera").style.display = "none";
          document.getElementById("openCamera").style.display = "inline-block";
          document.getElementById("error").innerText = "";
          console.log("Camera stopped");
        }).catch(err => {
          console.error("Error stopping camera:", err);
        });
      }
    });
  </script>
</body>
</html>
