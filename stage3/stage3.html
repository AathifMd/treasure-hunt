<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stage 3 – The Grand Finale</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <style>
    body { font-family: 'Verdana', sans-serif; background: #f5eef8; text-align: center; }
    h1 { color: #8e44ad; }
    #reader { width: 300px; margin: 20px auto; display: none; }
    .scan-btn { background: #8e44ad; color: white; padding: 15px 25px; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
    .hint-list { margin-top: 20px; font-size: 18px; color: #2c3e50; text-align: left; max-width: 500px; margin-left: auto; margin-right: auto; background: #ecf0f1; padding: 15px; border-radius: 8px; white-space: pre-line; }
    .error { margin-top: 20px; color: red; font-weight: bold; }
  </style>
</head>
<body>
  <h1>🏆 Stage 3 – The Grand Finale</h1>
  <p>Click the button to open your camera and scan the final QR code. It contains the full list of hints from all stages!</p>

  <button class="scan-btn" id="openCamera">📷 Open Camera</button>
  <button class="scan-btn" id="closeCamera" style="background: #e74c3c; display: none;">❌ Close Camera</button>
  <div id="reader"></div>

  <div class="hint-list" id="hint">All hints will appear here...</div>
  <div class="error" id="error"></div>

  <script>
    const validCodes = ["STAGE3-FINAL-CODE"];
    let savedHints = localStorage.getItem("stage3Hints") ? JSON.parse(localStorage.getItem("stage3Hints")) : [];
    if (savedHints.length > 0) {
      document.getElementById("hint").innerText = "Final Hints:\n" + savedHints.join("\n");
    }

    let html5QrCode;
    let isRunning = false;

    function onScanSuccess(decodedText) {
      if (validCodes.includes(decodedText)) {
        savedHints.push(decodedText);
        localStorage.setItem("stage3Hints", JSON.stringify(savedHints));
        document.getElementById("hint").innerText = "🎉 Final Code: " + decodedText + "\n\nAll Hints:\n" + savedHints.join("\n");
        document.getElementById("error").innerText = "";
      } else {
        document.getElementById("error").innerText = "❌ Not a valid hunt QR!";
      }
    }

    function onScanError(errorMessage) {
      console.warn(errorMessage);
    }

    // Open Camera Button
    document.getElementById("openCamera").addEventListener("click", () => {
      document.getElementById("openCamera").style.display = "none";
      document.getElementById("closeCamera").style.display = "inline-block";
      document.getElementById("reader").style.display = "block";
      document.getElementById("error").innerText = "Starting camera...";

      html5QrCode = new Html5Qrcode("reader");

      Html5Qrcode.getCameras().then(cameras => {
        if (cameras && cameras.length) {
          html5QrCode.start(
            cameras[1].id,
            { fps: 10, qrbox: 250 },
            onScanSuccess,
            onScanError
          ).then(() => {
            isRunning = true;
            document.getElementById("error").innerText = "";
            console.log("Camera started successfully");
          }).catch(err => {
            document.getElementById("error").innerText = "❌ Error starting camera: " + err;
            console.error("Error starting camera:", err);
          });
        } else {
          document.getElementById("error").innerText = "❌ No cameras found on this device.";
        }
      }).catch(err => {
        document.getElementById("error").innerText = "❌ Camera permission denied or not available.";
        console.error("Camera error:", err);
      });
    });

    // Close Camera Button
    document.getElementById("closeCamera").addEventListener("click", () => {
      if (isRunning) {
        html5QrCode.stop().then(() => {
          isRunning = false;
          document.getElementById("reader").style.display = "none";
          document.getElementById("closeCamera").style.display = "none";
          document.getElementById("openCamera").style.display = "inline-block";
          document.getElementById("error").innerText = "";
          console.log("Camera stopped");
        }).catch(err => {
          console.error("Error stopping camera:", err);
        });
      }
    });
  </script>
</body>
</html>
